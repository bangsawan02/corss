name: Build Android Virtual Emulator APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble & Sign Android Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # CACHING REQ: "selalu cache yaml github pakai if always()"
      - name: Cache Build Gradle Dependencies
        uses: actions/cache@v4
        if: always()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify Android Tooling Environment
        run: |
          echo "Java version info:"
          java -version
          echo "Android Home path: $ANDROID_HOME"

      - name: Prepare Assets directory
        run: mkdir -p app/src/main/assets

      - name: Cache ROM Image
        id: cache-rom
        uses: actions/cache@v4
        if: always()
        with:
          path: app/src/main/assets/system.img
          key: ${{ runner.os }}-rom-aosp_11_gapps

      - name: Download and Unpack Selected ROM System Image
        if: steps.cache-rom.outputs.cache-hit != 'true'
        run: |
          ROM_URL="https://github.com/phhusson/treble_experimentations/releases/download/v313/system-roar-arm64-ab-gapps.img.xz"
          echo "Target ROM URL: $ROM_URL"
          
          if [[ ! "$ROM_URL" =~ ^https?:// ]]; then
            echo "URL is not a remote link. Writing lightweight dummy placeholder..."
            echo "VPhoneGaga Core Emulator Embedded ROM Placeholder" > app/src/main/assets/system.img
          else
            echo "Downloading system partition image..."
            curl -L -o temp_rom "$ROM_URL"
            
            # Detect format and extract
            if [[ "$ROM_URL" == *.xz ]]; then
              echo "Decompressing xz archive..."
              xz -d -c temp_rom > app/src/main/assets/system.img
              rm temp_rom
            elif [[ "$ROM_URL" == *.zip ]]; then
              echo "Extracting zip archive..."
              unzip -p temp_rom > app/src/main/assets/system.img
              rm temp_rom
            else
              echo "Direct raw image file detected."
              mv temp_rom app/src/main/assets/system.img
            fi
          fi
          
          echo "Assets list:"
          ls -lh app/src/main/assets/

      - name: Generate Proper Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Compile and Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload Final APK Release
        uses: actions/upload-artifact@v4
        with:
          name: vphonegaga-root-emulator-apk
          path: app/build/outputs/apk/debug/app-debug.apk
