name: Build ARM64 Browser Murni GitHub Cloud

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-cloud:
    name: Build arm64-v8a Optimized APK
    runs-on: ubuntu-latest
    steps:
      - name: Maksimalkan Ruang Penyimpanan GitHub Runner
        run: |
          echo "=== CLEANING UP SPACE ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          df -h

      - name: Checkout Kode Kustom Anda
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependensi Sistem Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl wget openjdk-17-jdk python3-pip ninja-build

      - name: Unduh & Konfigurasi Google Depot Tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $GITHUB_WORKSPACE/depot_tools
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: Sinkronisasi Gclient & Ekstensi
        run: |
          export PATH=$PATH:$GITHUB_WORKSPACE/depot_tools
          # Optimasi konfigurasi Git global untuk Chromium/gclient sync
          git config --global core.deltaBaseCacheLimit 2G
          git config --global gc.auto 0
          gclient config --spec 'solutions = [ { "name": "src", "url": "https://github.com/kiwibrowser/src.git", "managed": False, "custom_deps": {}, "safesync_url": "" } ]'
          gclient sync --no-history --force --reset

      - name: Terapkan Konfigurasi ARM64 Khusus
        run: |
          export PATH=$PATH:$GITHUB_WORKSPACE/depot_tools
          cd src
          mkdir -p out/Android_Arm64
          cp ../args.gn out/Android_Arm64/args.gn
          gn gen out/Android_Arm64

      - name: Jalankan Python Patching (Anti-Corrupt Patch)
        run: |
          chmod +x scripts/build-arm64.sh
          ./scripts/build-arm64.sh

      - name: Kompilasi APK & Modul libchrome.so
        run: |
          export PATH=$PATH:$GITHUB_WORKSPACE/depot_tools
          cd src
          # Menggunakan seluruh thread CPU yang tersedia di GitHub Actions
          ninja -j $(nproc) -C out/Android_Arm64 chrome_public_apk

      - name: Otomatis Tanda Tangan (Sign) APK
        run: |
          echo "=== SIGNING APK ==="
          # Check if Android SDK build-tools is available or use a fallback generator
          APK_PATH="src/out/Android_Arm64/apks/ChromePublic.apk"
          SIGNED_APK_PATH="src/out/Android_Arm64/apks/ChromePublic-signed.apk"
          
          if [ -f "$APK_PATH" ]; then
            # Generate keytool keystore on-the-fly for seamless play-protect compatibility
            keytool -genkey -v -keystore temp.keystore -alias temp_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temppass -keypass temppass -dname "CN=KiwiCustom, OU=Dev, O=Build, L=Cloud, S=Cloud, C=US"
            
            # Find apksigner in android sdk
            APKSIGNER=$(find $ANDROID_HOME/build-tools/ -name apksigner | sort -r | head -n 1)
            if [ -n "$APKSIGNER" ]; then
              $APKSIGNER sign --ks temp.keystore --ks-pass pass:temppass --ks-key-alias temp_alias --out "$SIGNED_APK_PATH" "$APK_PATH"
              echo "SUCCESS: APK signed successfully!"
            else
              echo "WARNING: apksigner not found. Using jarsigner fallback."
              jarsigner -keystore temp.keystore -storepass temppass -keypass temppass "$APK_PATH" temp_alias
              cp "$APK_PATH" "$SIGNED_APK_PATH"
            fi
          else
            echo "Error: ChromePublic.apk not found to sign!"
          fi

      - name: Unggah Hasil APK Release ke Artefak GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Cloud-Browser-ARM64
          path: src/out/Android_Arm64/apks/ChromePublic-signed.apk
          retention-days: 7
