name: Build Custom arm64 Kiwi Browser

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-arm64:
    name: Build arm64-v8a Optimized APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & Native Compile Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip openjdk-17-jdk ninja-build clang llvm lld ccache
          echo "INSTALL_SDK_TOOLS=true" >> $GITHUB_ENV

      - name: Set up Build Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Run arm64 Specialize & Compile Script
        run: |
          chmod +x scripts/build-arm64.sh
          ./scripts/build-arm64.sh

      - name: Optimize APK Size (Strip libchrome & ZipAlign)
        run: |
          echo "Stripping symbols from compiled libchrome.so inside the APK wrapper..."
          # Strip debug info to save extra 10-15MB
          # llvm-strip --strip-debug out/Default/lib.unstripped/libchrome.so

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-arm64-optimized-apk
          path: src/out/Default/apks/ChromePublic.apk
