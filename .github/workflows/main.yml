name: Build Zygisk Frida Stealth (Gadget)

on:
  workflow_dispatch:

jobs:
  build:
    name: Package Magisk Zygisk Module
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch Core Binaries
      run: |
        mkdir -p ./lib
        mkdir -p ./zygisk
        # Fetch Frida Gadget (.so)
        curl -L -o ./lib/frida-gadget.so.xz https://github.com/frida/frida/releases/download/16.2.1/frida-gadget-16.2.1-android-arm64.so.xz
        xz -d ./lib/frida-gadget.so.xz
        
        # Fetch Zygisk Bridge (libzygiskfrida) from lico-n
        # Using v0.2.0 which is a known release
        curl -L -o zygisk-frida-bridge.zip https://github.com/lico-n/ZygiskFrida/releases/download/v0.2.0/ZygiskFrida-v0.2.0.zip
        unzip zygisk-frida-bridge.zip -d zygisk_tmp
        cp zygisk_tmp/zygisk/*.so ./zygisk/
        rm -rf zygisk_tmp zygisk-frida-bridge.zip

    - name: Compress Module layout to Flashable Zip
      run: zip -r zygisk-frida-stealth.zip . -x "*.git*" "*.github*" "node_modules/*" "*.xz"

    - name: Upload Flashable Module Zip to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-frida-gadget-module
        path: zygisk-frida-stealth.zip
        retention-days: 7