name: Build Zygisk Frida Stealth (Gadget)

on:
  workflow_dispatch:

jobs:
  build:
    name: Package Magisk Zygisk Module
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch Core Binaries
      run: |
        mkdir -p ./lib
        mkdir -p ./zygisk
        # Fetch Frida Gadget (.so)
        curl -L -o ./lib/frida-gadget.so.xz https://github.com/frida/frida/releases/download/16.2.1/frida-gadget-16.2.1-android-arm64.so.xz
        xz -d ./lib/frida-gadget.so.xz
        
        # Fetch Zygisk Bridge (libzygiskfrida) from lico-n
        # Using v1.9.0 which is the latest stable release
        curl -L -o zygisk-frida-bridge.zip https://github.com/lico-n/ZygiskFrida/releases/download/v1.9.0/ZygiskFrida-v1.9.0-release.zip
        unzip zygisk-frida-bridge.zip -d zygisk_tmp
        mkdir -p ./zygisk
        # Copy architecture specific libraries to module structure
        cp -r zygisk_tmp/zygisk/* ./zygisk/
        rm -rf zygisk_tmp zygisk-frida-bridge.zip

    - name: Compress Module layout to Flashable Zip
      run: |
        # Explicitly zip only required module components to avoid repo trash
        zip -r zygisk-frida-stealth.zip module.prop service.sh customize.sh web/ lib/ zygisk/ hooks/ config.json || true
        # Verify if zip was created, if not, handle error
        if [ ! -f zygisk-frida-stealth.zip ]; then
          echo "Error: Standard zipping failed, attempting catch-all..."
          zip -r zygisk-frida-stealth.zip . -x "*.xz" "*.git*" "*.github*" "node_modules/*"
        fi

    - name: Upload Flashable Module Zip to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-frida-gadget-module
        path: zygisk-frida-stealth.zip
        retention-days: 7