name: Build Zygisk Frida Stealth (Gadget)

on:
  workflow_dispatch:

jobs:
  build:
    name: Package Magisk Zygisk Module
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch Core Binaries
      run: |
        # Buat struktur folder modul Magisk yang benar
        mkdir -p ./zygisk
        mkdir -p ./lib
        
        # 1. Ambil Frida Gadget (.so)
        curl -L -o ./lib/frida-gadget.so.xz https://github.com/frida/frida/releases/download/16.2.1/frida-gadget-16.2.1-android-arm64.so.xz
        xz -d ./lib/frida-gadget.so.xz
        
        # 2. Ambil Zygisk Bridge dari lico-n
        curl -L -o zygisk-frida-bridge.zip https://github.com/lico-n/ZygiskFrida/releases/download/v1.9.0/ZygiskFrida-v1.9.0.zip
        
        # Ekstrak langsung file .so spesifik arm64 untuk menghemat ruang dan menjaga ukuran file tetap kecil
        # Rilis ZygiskFrida biasanya menyimpan library zygisk di dalam folder zygisk/ di dalam zip-nya
        unzip -j zygisk-frida-bridge.zip "zygisk/arm64-v8a.so" -d ./zygisk/
        
        # Bersihkan file zip unduhan agar tidak masuk ke artifact
        rm -f zygisk-frida-bridge.zip

    - name: Compress Module layout to Flashable Zip
      run: zip -r zygisk-frida-stealth.zip . -x "*.git*" "*.github*" "node_modules/*" "*.xz"

    - name: Upload Flashable Module Zip to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-frida-gadget-module
        path: zygisk-frida-stealth.zip
        retention-days: 7
