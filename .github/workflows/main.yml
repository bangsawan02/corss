name: Build Zygisk Frida Stealth (Gadget)

on:
  workflow_dispatch:

jobs:
  build:
    name: Package Magisk Zygisk Module
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch Core Binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Wajib ada untuk otentikasi gh CLI
      run: |
        # Membuat struktur folder modul
        mkdir -p ./zygisk
        mkdir -p ./lib
        
        # 1. Unduh Frida Gadget (.so) arm64
        curl -L -o ./lib/frida-gadget.so.xz https://github.com/frida/frida/releases/download/16.2.1/frida-gadget-16.2.1-android-arm64.so.xz
        xz -d ./lib/frida-gadget.so.xz
        
        # 2. Unduh Zygisk Bridge dari lico-n menggunakan GitHub CLI (Anti-404)
        gh release download v1.9.0 -R lico-n/ZygiskFrida -p "*.zip" --clobber
        
        # 3. Ekstrak hanya file .so untuk arm64 (meminimalkan ukuran modul sesuai preferensi)
        unzip -j *.zip "*arm64*.so" -d ./zygisk/
        
        # Bersihkan sisa zip unduhan agar tidak masuk ke hasil akhir
        rm -f *.zip

    - name: Compress Module layout to Flashable Zip
      run: zip -r zygisk-frida-stealth.zip . -x "*.git*" "*.github*" "node_modules/*" "*.xz"

    - name: Upload Flashable Module Zip to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-frida-gadget-module
        path: zygisk-frida-stealth.zip
        retention-days: 7
