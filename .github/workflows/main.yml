name: Build Zygisk Frida Stealth

on:
  workflow_dispatch:

jobs:
  build:
    name: Package Magisk Zygisk Module
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch Core Binaries
      run: |
        mkdir -p ./bin
        mkdir -p ./zygisk
        # Fetch Frida Server
        curl -L -o ./bin/frida-server.xz https://github.com/frida/frida/releases/download/16.2.1/frida-server-16.2.1-android-arm64.xz
        xz -d ./bin/frida-server.xz
        chmod +x ./bin/frida-server
        
        # Fetch Zygisk Bridge (libzygiskfrida)
        curl -L -o ./zygisk/libzygiskfrida.so https://github.com/lico-n/ZygiskFrida/releases/download/v1.0.0/libzygiskfrida.so || echo "Warning: Native zygisk bridge download failed"

    - name: Compress Module layout to Flashable Zip
      run: zip -r zygisk-frida-stealth.zip . -x "*.git*" "*.github*" "node_modules/*" "*.xz"

    - name: Upload Flashable Module Zip to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zygisk-frida-module
        path: zygisk-frida-stealth.zip
        retention-days: 7