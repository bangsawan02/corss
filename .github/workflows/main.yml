name: Node.js CI

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Auto-terminate setelah 10 menit jika tidak ada aktivitas
    timeout-minutes: 10
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache Restore: Mengambil dependensi yang sudah dipersisten sebelumnya
      - name: Restore node modules cache
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      # Live Terminal Debugging: Menggunakan tmate untuk akses langsung ke runner
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3

      - name: Run Build
        run: npm run build

      # Cache Save: Menyimpan dependensi kembali ke cache (selalu berjalan meski gagal)
      - name: Save node modules cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}