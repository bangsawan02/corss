name: Build Zygisk Frida Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version to build with'
        required: true
        default: '16.3.3'

jobs:
  build:
    name: Build & Package Magisk Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Cache Frida Gadget Downloads
        id: cache-frida
        uses: actions/cache@v4
        if: always()
        with:
          path: assets
          key: frida-gadgets-${{ github.event.inputs.frida_version || '16.3.3' }}

      - name: Fetch Official Frida Gadgets
        if: steps.cache-frida.outputs.cache-hit != 'true'
        run: |
          # Use provided Frida version or default
          FRIDA_VER="${{ github.event.inputs.frida_version || '16.3.3' }}"
          echo "Using Frida version: $FRIDA_VER"
          mkdir -p assets
          
          # Architecture mappings from Android ABI to Frida releases
          declare -A ARCH_MAP
          ARCH_MAP["arm64"]="android-arm64"
          ARCH_MAP["arm"]="android-arm"
          ARCH_MAP["x86"]="android-x86"
          ARCH_MAP["x86_64"]="android-x86_64"

          for arch in "${!ARCH_MAP[@]}"; do
            frida_arch=${ARCH_MAP[$arch]}
            url="https://github.com/frida/frida/releases/download/$FRIDA_VER/frida-gadget-$FRIDA_VER-$frida_arch.so.xz"
            echo "Downloading $url"
            
            if curl -L -f -o "assets/libfrida-gadget-$arch.so.xz" "$url"; then
              xz -d "assets/libfrida-gadget-$arch.so.xz"
            else
              echo "WARNING: Failed to retrieve Frida Gadget for $arch"
            fi
          done

      - name: Compile C++ Zygisk Code via ndk-build
        run: |
          ndk-build -C jni

      - name: Assemble Magisk Module Structure
        run: |
          mkdir -p dist
          mkdir -p dist/zygisk
          mkdir -p dist/system/lib
          mkdir -p dist/system/lib64
          
          # Copy Module meta configurations
          cp module.prop dist/
          cp customize.sh dist/
          
          # Copy NDK built library dependencies for multiple architectures
          # standard mapping uses libs/<arch_folder>/libzygisk_frida.so
          [ -f "libs/arm64-v8a/libzygisk_frida.so" ] && cp "libs/arm64-v8a/libzygisk_frida.so" dist/zygisk/arm64-v8a.so
          [ -f "libs/armeabi-v7a/libzygisk_frida.so" ] && cp "libs/armeabi-v7a/libzygisk_frida.so" dist/zygisk/armeabi-v7a.so
          [ -f "libs/x86/libzygisk_frida.so" ] && cp "libs/x86/libzygisk_frida.so" dist/zygisk/x86.so
          [ -f "libs/x86_64/libzygisk_frida.so" ] && cp "libs/x86_64/libzygisk_frida.so" dist/zygisk/x86_64.so
          
          # Copy Frida Gadget shared library files inside system mount targets
          [ -f "assets/libfrida-gadget-arm64.so" ] && cp "assets/libfrida-gadget-arm64.so" dist/system/lib64/libfrida-gadget.so
          [ -f "assets/libfrida-gadget-arm.so" ] && cp "assets/libfrida-gadget-arm.so" dist/system/lib/libfrida-gadget.so
          
          # Inject generated template configuration file alongside the modules
          cp libfrida-gadget.config.json dist/system/lib64/libfrida-gadget.config.so
          cp libfrida-gadget.config.json dist/system/lib/libfrida-gadget.config.so
          
          # Dynamic package targets file configuration init
          echo "com.taxsee.driver2" > dist/target_packages.txt

      - name: Pack Final Magisk Module ZIP
        run: |
          cd dist
          zip -r ../zygisk-fridagadget-v${{ github.event.inputs.frida_version || '16.3.3' }}.zip ./*

      - name: Publish Built Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-fridagadget-release
          path: zygisk-fridagadget-v*.zip
