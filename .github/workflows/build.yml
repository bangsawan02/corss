name: Build MT Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Cache pip dependencies
    - name: Cache Pip Packages
      uses: actions/cache@v4
      if: always()
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Cache buildozer dependencies global (ccache, Android SDK/NDK, downloads)
    - name: Cache Buildozer Global
      uses: actions/cache@v4
      if: always()
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-global-

    # Cache buildozer project build state
    - name: Cache Buildozer Local
      uses: actions/cache@v4
      if: always()
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-local-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-local-

    # Cache Android SDK/NDK artifacts
    - name: Cache Android SDK
      uses: actions/cache@v4
      if: always()
      with:
        path: ~/.android
        key: ${{ runner.os }}-android-sdk
        restore-keys: |
          ${{ runner.os }}-android-sdk

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          libltdl-dev \
          libffi-dev \
          libssl-dev \
          autoconf \
          autotools-dev \
          bison \
          git \
          ffmpeg \
          pkg-config \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    - name: Build Android Debug APK
      run: |
        buildozer android debug

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: MT-Manager-Android-APK
        path: bin/*.apk
