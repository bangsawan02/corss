name: Build POCO X3 NFC Kernel (surya)

on:
  push:
    branches: [ "lineage-20" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Kernel dengan KernelSU-Next
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kode Sumber Kernel
        uses: actions/checkout@v4
        with:
          repository: GiaSen/android_kernel_xiaomi_surya
          ref: lineage-20
          path: kernel-surya

      - name: Siapkan Dependency Sistem
        run: |
          sudo apt update
          sudo apt install -y bc build-essential libncurses5-dev libssl-dev git bison flex libelf-dev clang lld llvm curl zip

      - name: Caching Toolchain Compiler
        id: cache-toolchain
        uses: actions/cache@v4
        if: always()
        with:
          path: kernel-surya/toolchains
          key: ${{ runner.os }}-toolchain-proton-clang
          restore-keys: |
            ${{ runner.os }}-toolchain-

      - name: Unduh Compiler Toolchain (Jika Cache Miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd kernel-surya
          mkdir -p toolchains
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchains/proton-clang

      - name: Suntikkan (Patch) KernelSU-Next Legacy
        run: |
          cd kernel-surya
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -s main

      - name: Konfigurasi dan Kompilasi Kernel
        run: |
          cd kernel-surya
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/toolchains/proton-clang/bin:$PATH"

          # 1. Load Konfigurasi Defconfig Bawaan
          make O=out surya_defconfig

          # 2. Suntikkan Fitur & Tweak Pilihan Anda secara Otomatis
          scripts/config --file out/.config --enable KSU
          scripts/config --file out/.config --enable ASSIST_KSU_NEXT
          scripts/config --file out/.config --enable OVERLAY_FS
          scripts/config --file out/.config --enable ENERGY_MODEL
          scripts/config --file out/.config --enable SCHED_WALT
          scripts/config --file out/.config --enable DEBUG_KERNEL
          scripts/config --file out/.config --enable LTO_CLANG_THIN
          scripts/config --file out/.config --enable CC_WERROR
          scripts/config --file out/.config --enable CPU_FREQ_GOV_SCHEDUTIL
          scripts/config --file out/.config --enable CPU_FREQ_GOV_PERFORMANCE
          scripts/config --file out/.config --enable TCP_CONG_BBR
          scripts/config --file out/.config --enable WIREGUARD

          # 2.5 Tweak Optimasi Hemat Baterai Ekstrem (Battery-First)
          scripts/config --file out/.config --enable CPU_IDLE_GOV_MENU
          scripts/config --file out/.config --enable ARM_CPUIDLE
          scripts/config --file out/.config --enable WQ_POWER_EFFICIENT_DEFAULT
          scripts/config --file out/.config --enable CPU_FREQ_DEFAULT_GOV_SCHEDUTIL
          scripts/config --file out/.config --enable PM_AUTOSUSPEND
          scripts/config --file out/.config --disable CPU_FREQ_GOV_PERFORMANCE

          # 3. Mulai Proses Compile Menggunakan Seluruh Core Runner
          make -j$(nproc) O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Bungkus Kernel ke AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          # Salin hasil biner kernel surya
          cp kernel-surya/out/arch/arm64/boot/Image.gz-dtb anykernel/
          cd anykernel
          # Kompres menjadi flashable zip
          zip -r9 ../kernel-surya-ksu-next.zip *

      - name: Unggah Hasil Flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: POCO-X3-NFC-KernelSU-Next-Legacy
          path: kernel-surya-ksu-next.zip
